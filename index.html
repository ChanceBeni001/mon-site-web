<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mon Profil Développeur</title>
    <style>
        body {
            font-family: sans-serif;
            background-color: #0f172a;
            color: #f8fafc;
            text-align: center;
            padding: 50px 20px;
        }
        .carte {
            background-color: #1e293b;
            max-width: 450px;
            margin: 0 auto;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.3);
            border: 1px solid #38bdf8;
        }
        h1 { color: #38bdf8; margin-bottom: 5px; }
        .badge {
            background-color: #38bdf8;
            color: #0f172a;
            padding: 5px 10px;
            border-radius: 20px;
            font-size: 0.8rem;
            font-weight: bold;
            display: inline-block;
            margin: 5px;
        }
        .bouton-container {
            margin-top: 25px;
        }
        .bouton {
            display: inline-block;
            background-color: transparent;
            color: #38bdf8;
            border: 2px solid #38bdf8;
            padding: 10px 20px;
            border-radius: 8px;
            text-decoration: none;
            font-weight: bold;
            margin: 5px;
            font-size: 0.9rem;
        }
        .bio {
            font-size: 0.95rem;
            color: #94a3b8;
            line-height: 1.5;
        }
    </style>
</head>
<body>

    <div class="carte">
        <h1>Chance</h1>
        <p>🚀 Apprenti Développeur Mobile & Web</p>
        
        <hr style="border-color: #334155; margin: 20px 0;">
        
        <p class="bio">Passionné par la technologie, j'apprends à coder et à déployer des projets directement depuis mon smartphone grâce à Termux et Git.</p>
        
        <hr style="border-color: #334155; margin: 20px 0;">

        <h3>Mes Compétences :</h3>
        <span class="badge">Termux</span>
        <span class="badge">Git & GitHub</span>
        <span class="badge">Python</span>
        <span class="badge">HTML / CSS</span>

        <div class="bouton-container">
            <a href="https://github.com/ChanceBeni001" target="_blank" class="bouton">Mon GitHub</a>
            <a href="mailto:ton-email@gmail.com" class="bouton">Me Contacter</a>
        </div>
    </div>

</body>
</html>
